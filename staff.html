<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITI Staff Management</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #343a40;
        color: white;
        padding: 15px 20px;
        border-radius: 8px;
    }

    nav a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }

    section {
        background: white;
        padding: 20px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px #ccc;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .row {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
    }

    label {
        width: 160px;
        font-weight: bold;
        text-align: right;
        padding-top: 8px;
    }

    input, select {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: 2px solid #999;
    }

    button {
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
    }

    button:hover {
        background: #0056b3;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }

    th, td {
        border: 1px solid #333;
        padding: 8px;
        text-align: center;
    }

    th {
        background: #28a745;
        color: white;
    }
</style>
</head>

<body>

<nav>
    <h3>ITI Staff Management</h3>
    <button><a href="./admission.html" class="home-back">⬅ Back</a></button>
    <a href="./welcome.html"> Home</a>
</nav>

<!-- STAFF FORM -->
<section>
    <h2>Add Staff</h2>

    <div class="row">
        <label>Staff ID :</label>
        <input id="sid">
    </div>

    <div class="row">
        <label>Name :</label>
        <input id="sname">
    </div>

    <div class="row">
        <label>Designation :</label>
        <select id="designation">
            <option value="">Select</option>
            <option>Principal</option>
            <option>Vice Principal</option>
            <option>AO</option>
            <option>Training Officer</option>
            <option>JTO</option>
            <option>OS</option>
            <option>FDA</option>
            <option>SDA</option>
            <option>Group-D</option>
            <option>Typiest</option>
        </select>
    </div>

    <div class="row">
        <label>Trade :</label>
        <select id="trade">
            <option value="">Select Trade</option>
            <option>Electrician</option>
            <option>Fitter</option>
            <option>COPA</option>
            <option>Welder</option>
            <option>Turner</option>
            <option>Mechanic Diesel</option>
            <option>mmv</option>
            <option>DMC</option>
            <option>TRAC</option>
            <option>Machaniast</option>
            <option>AD</option>
            <option>EM</option>
            <option>ICTCM</option>
            <option>WWT</option>
        </select>
    </div>

    <div class="row">
        <label>Contact :</label>
        <input id="contact">
    </div>

    <div class="row">
        <label>E mail :</label>
        <input id="email">
    </div>

    <button onclick="addStaff()">Add Staff</button>
</section>

<!-- STAFF LIST -->
<section>
    <h2>Staff List</h2>
    <div id="staffTable"></div>
</section>

<script>
let staff = JSON.parse(localStorage.getItem("staff")) || [];

function addStaff() {
    let member = {
        id: sid.value,
        name: sname.value,
        designation: designation.value,
        trade: trade.value,
        contact: contact.value,
        email: email.value
    };

    if (!member.id || !member.name || !member.designation) {
        alert("Fill required fields");
        return;
    }

    staff.push(member);
    localStorage.setItem("staff", JSON.stringify(staff));
    showStaff();

    document.querySelectorAll("input").forEach(i => i.value = "");
    designation.value = "";
    trade.value = "";
}

function showStaff() {
    let html = `
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Designation</th>
                <th>Trade</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
    `;

    staff.forEach((s, i) => {
        html += `
        <tr>
            <td>${s.id}</td>
            <td>${s.name}</td>
            <td>${s.designation}</td>
            <td>${s.trade}</td>
            <td>${s.contact}</td>
            <td>${s.email}</td>
            <td>
                <button onclick="removeStaff(${i})">Remove</button>
            </td>
        </tr>
        `;
    });

    html += "</table>";
    staffTable.innerHTML = html;
}

function removeStaff(index) {
    staff.splice(index, 1);
    localStorage.setItem("staff", JSON.stringify(staff));
    showStaff();
}

document.addEventListener("DOMContentLoaded", showStaff);
</script>

</body>
</html>
