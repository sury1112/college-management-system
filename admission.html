<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management System</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* NAVBAR */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #343a40;
            color: white;
            padding: 15px 20px;
        }

        .nav-buttons button {
            margin-left: 10px;
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #007bff;
            color: white;
        }

        .nav-buttons button:hover {
            background: #0056b3;
        }

        /* CENTER CONTENT */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 70px);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .student {
            background: #007bff;
        }

        .staff {
            background: #28a745;
        }

        .btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="top-nav">
        <h2>Management Panel</h2>
        <div class="nav-buttons">
            <button >
                <a href="./welcome.html" style="text-decoration: none;color: white;">🏠 Home</a></button>
            <button ><a href="./admin.html" style="text-decoration: none;color: white;">⬅ Back</a></button>
            <button ><a href="./admin.html" style="text-decoration: none;color: white;">🚪 Logout</a></button>
        </div>
    </nav>

    <!-- CENTER CONTENT -->
    <div class="main-content">
        <div class="container">
            <h1>Management System</h1>


        <button class="btn student">
            <a href="./studentadmission.html" style="text-decoration: none;color: white;">Student Management System</a>
        </button>

        <button class="btn staff">

            <a href="./staff.html" style="text-decoration: none;color: white;">Staff Management System</a>

        </button>
        </div>
    </div>

    

</body>
</html>
