<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .login-box,
        .admission,
        .students {
            background: rgb(173, 239, 5);
            padding: 20px;
            max-width: auto;
            margin: auto;
            border-radius: 5px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }

        button {
            width: 400px;
            padding: 8px;
            margin: 8px 0;

        }

        .step {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .step label {
            width: 150px;
            font-weight: bold;
            text-align: right;
            padding-top: 8px;
            /* aligns with textarea */
        }

        input,
        select {
            width: 400px;
            height: 40px;
            padding: 8px;
            border: 2px solid grey;
            border-radius: 10px;
        }

        textarea {
            width: 400px;
            height: 80px;
            padding: 8px;
            border: 2px solid grey;
            border-radius: 10px;
            resize: none;
        }
        .home-back{
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        button {
            background: #000000e6;
            color: white;
            cursor: pointer;
            font-weight: bold;
            width: 100px;
            text-decoration: none;
            border-radius: 10px;
            border: 3px solid black;
        }

        button:hover {
            background: #0056b3;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        table th,
        table td {
            border: 1px solid #000000;
            padding: 8px;
            text-align: center;
        }

        table th {
            background: #007bff;
            color: white;
        }

        textarea {
            width: 100%;
            height: 60px;
            margin: 8px 0;
        }

        h3 {
            background: #222;
            color: white;
            padding: 5px;
            width: auto;
        }

        #address {
            width: 400px;
        }
    </style>
    </style>

</head>
<body>
    

        <nav>
            <h2>Admin Panel</h2>
            <button><a href="./welcome.html" class="home-back">Home</a></button>
            <button><a href="./admission.html" class="home-back">Back</a></button>
            <button onclick="logout()">Logout</button>
        </nav>

        <!-- ADMISSION FORM -->
        <section class="admission">
            <h2>Student Admission Form</h2>

            <div class="step"><label>Roll Number : </label><input id="sid" placeholder="Roll Number"></div>
            <div class="step"><label>Student Name : </label><input id="sname" placeholder="Student Name"></div>
            <div class="step"> <label>Father Name : </label><input id="fname" placeholder="Father Name"></div>

            <div class="step">
                <label>Date of Birth : </label>
                <input id="dob" type="date">
            </div>

            <div class="step">
                <label>Category : </label>
                <select id="category">
                    <option value="">Select Category</option>
                    <option>SC</option>
                    <option>ST</option>
                    <option>OBC</option>
                    <option>EWS</option>
                    <option>UR</option>
                </select>
            </div>
            <div class="step"><label>Contact Number : </label><input id="contact" placeholder="Contact Number"></div>
            <div class="step"><label>Email ID : </label><input id="email" placeholder="Email ID"></div>
            <div class="step"><label>City : </label><input id="city" placeholder="City"></div>
            <div class="step"><label>Address : </label><textarea id="address" placeholder="Address"></textarea></div>

            <div class="step">
                <label>Trade : </label>
                <select id="strade">
                    <option value="">Select Trade</option>
                    <option>Electrician</option>
                    <option>Fitter</option>
                    <option>COPA</option>
                    <option>EM</option>
                    <option>Welder</option>
                    <option>Turner</option>
                    <option>Mechanic Diesel</option>
                    <option>DMC</option>
                    <option>TRAC</option>
                    <option>Machanist</option>
                    <option>AD</option>
                    <option>ICTSM</option>
                    <option>mmv</option>
                </select>
            </div>

            <button onclick="addStudent()">Add Student</button>
        </section>

        <!-- STUDENT TABLES -->
        <section class="students">
            <h2>Students List</h2>
            <div id="tables"></div>
        </section>

    

    <script src="./script.js"></script>
</body>
</html>
