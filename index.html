<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to ITI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(to right, #00416A, #E4E5E6);
            color: #fff;
        }

        header {
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            text-align: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }
        h1{
            text-align: center;
        }

        .hero {
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content {
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 12px;
            max-width: 700px;
        }

        .hero-content h2 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .hero-content p {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .hero-content button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: #ff9800;
            color: #000;
            cursor: pointer;
            transition: 0.3s;
        }

        .hero-content button:hover {
            background: #ffc107;
        }
        button{
            width: 150px;
            font-weight: bold;
            
        }

        footer {
            background: rgba(0, 0, 0, 0.5);
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header style="text-align: center;">
        <h1 style="text-align: center;">Govt. Industrial Training Institute (M) Kalaburagi</h1>
        <nav>
           
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Welcome to College Management System </h2>
            <p>
                Empowering students with technical skills, practical training,
                and industry-ready knowledge to build a successful future.
            </p>
            <button onclick="window.location.href='Welcome.html'"><a href="./welcome.html" style="text-decoration: none;">START</a></button>
        </div>
    </section>

    <footer>
        © 2026 ITI Institute | Skill • Knowledge • Success
    </footer>

</body>
</html>
